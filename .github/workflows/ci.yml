name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    name: Backend Tests & Quality
    runs-on: ubuntu-latest
    continue-on-error: true

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: agenziecase_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: ./server
        run: npm ci --legacy-peer-deps

      - name: Run linter
        working-directory: ./server
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        working-directory: ./server
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: agenziecase_test
          DB_USER: test
          DB_PASSWORD: test
          JWT_SECRET: test-secret-key
          GROQ_API_KEY: test-key
        run: npm test -- --coverage --maxWorkers=2
        continue-on-error: true

      - name: Upload coverage reports
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./server/coverage/lcov.info
          flags: backend
          name: backend-coverage
        continue-on-error: true

  frontend-tests:
    name: Frontend Tests & Quality
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Run frontend tests
        run: npm run test -- --run --coverage
        continue-on-error: true

      - name: Build frontend
        run: npm run build
        continue-on-error: true

      - name: Upload coverage reports
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: coverage/lcov.info
          flags: frontend
          name: frontend-coverage
        continue-on-error: true

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit
        run: npm audit --production
        continue-on-error: true

      - name: Check for vulnerabilities
        working-directory: ./server
        run: npm audit --production
        continue-on-error: true

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: |
          docker build -t agenziecase-backend:test \
            -f Dockerfile.backend .

      - name: Build frontend image
        run: |
          docker build -t agenziecase-frontend:test \
            -f Dockerfile.frontend .

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, docker-build]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.agenziecase.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check secrets are configured
        run: |
          if [ -z "${{ secrets.HETZNER_HOST }}" ]; then
            echo "❌ HETZNER_HOST secret not configured"
            echo "📖 Please configure secrets following GITHUB_SETSUP_GUIDE.md"
            exit 1
          fi

      - name: Deploy to Hetzner Staging
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            echo "🚀 Deploying to staging..."
            cd /root/agenziecase
            git fetch origin
            git reset --hard origin/develop
            docker compose -f docker-compose.yml -f docker-compose.staging.yml pull
            docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d --build
            echo "✅ Staging deployment completed!"
            docker compose ps

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, docker-build, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://agenziecase.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check secrets are configured
        run: |
          if [ -z "${{ secrets.HETZNER_HOST }}" ]; then
            echo "❌ HETZNER_HOST secret not configured"
            echo "📖 Please configure secrets following GITHUB_SETSUP_GUIDE.md"
            exit 1
          fi

      - name: Deploy to Hetzner Production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            echo "🚀 Deploying to production..."
            cd /root/agenziecase
            git fetch origin
            git reset --hard origin/main
            docker compose pull
            docker compose up -d --build
            docker system prune -f
            echo "✅ Deployment completed successfully!"
            docker compose ps
