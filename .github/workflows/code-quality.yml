name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  eslint:
    name: ESLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci --legacy-peer-deps
          cd server && npm ci --legacy-peer-deps

      - name: Run ESLint on frontend
        run: npm run lint
        continue-on-error: true

      - name: Run ESLint on backend
        working-directory: ./server
        run: npm run lint
        continue-on-error: true

  prettier:
    name: Prettier Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Prettier check
        run: npm run format:check
        continue-on-error: true

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci --legacy-peer-deps
          cd server && npm ci --legacy-peer-deps

      # Type check skipped - not configured in project
      - name: Type check skipped
        run: echo "Type check not configured - skipped"
