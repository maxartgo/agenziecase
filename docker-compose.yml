version: '3.8'

services:
  # PostgreSQL Database
  database:
    image: postgres:16-alpine
    container_name: agenziecase-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agenziecase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agenziecase_password}
      POSTGRES_DB: ${POSTGRES_DB:-agenziecase}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agenziecase}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agenziecase-network

  # Redis Cache (Internal only - NOT exposed)
  redis:
    image: redis:7-alpine
    container_name: agenziecase-redis
    restart: unless-stopped
    # NOTA: Nessuna porta esposta pubblicamente - Redis accessibile solo dalla rete Docker interna
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --bind 0.0.0.0
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - agenziecase-network

  # Backend API
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: agenziecase-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3456}:3456"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3456
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-agenziecase}
      DB_USER: ${POSTGRES_USER:-agenziecase}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-agenziecase_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      JWT_SECRET: ${JWT_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3456/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - agenziecase-network
    volumes:
      - ./server:/app
      - /app/node_modules

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: agenziecase-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - agenziecase-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  agenziecase-network:
    driver: bridge
