# Docker Compose Override for Local Development
# This file extends docker-compose.yml with development-specific configurations
# Run: docker-compose -f docker-compose.yml -f docker-compose.override.yml up

version: '3.8'

services:
  # Development Backend
  backend:
    environment:
      - NODE_ENV=development
      - DEBUG=agenziecase:*
    volumes:
      # Mount source code for hot-reload
      - ./server:/app
      - /app/node_modules
    command: npm run dev  # Use development server with hot-reload

  # Development Frontend
  frontend:
    environment:
      - NODE_ENV=development
    volumes:
      # Mount source code for hot-reload
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
    # Build development image with Vite dev server
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"  # Vite dev server

  # Optional: Adminer for database management
  adminer:
    image: adminer:latest
    container_name: agenziecase-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: database
    networks:
      - agenziecase-network

  # Optional: Redis Commander for Redis management
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: agenziecase-redis-commander
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379:0:redis_password
    networks:
      - agenziecase-network
