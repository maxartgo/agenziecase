<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Audio Playback - ElevenLabs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #fff;
        }
        h1 {
            color: #d4af37;
        }
        button {
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            border: none;
            color: #0a0a0a;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px 5px;
        }
        button:hover {
            opacity: 0.9;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #status {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            min-height: 50px;
        }
        .success {
            color: #00c853;
        }
        .error {
            color: #ff5722;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #fff;
            border-radius: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>🔊 Test Audio Playback - ElevenLabs TTS</h1>

    <p>Questa pagina testa il playback audio dell'API ElevenLabs.</p>

    <div>
        <label for="textInput">Testo da convertire in audio:</label>
        <input type="text" id="textInput" value="Ciao! Questo è un test dell'audio generato da ElevenLabs." />
    </div>

    <div>
        <button onclick="testTTS()">🎤 Genera e Riproduci Audio</button>
        <button onclick="stopAudio()">⏹️ Ferma Audio</button>
        <button onclick="testFile()">📁 Riproduci File Locale</button>
    </div>

    <div id="status">Pronto per il test...</div>

    <script>
        let currentAudio = null;

        async function testTTS() {
            const text = document.getElementById('textInput').value;
            const statusDiv = document.getElementById('status');

            if (!text.trim()) {
                statusDiv.innerHTML = '<span class="error">⚠️ Inserisci del testo</span>';
                return;
            }

            statusDiv.innerHTML = '⏳ Chiamata API in corso...';

            try {
                // Chiamata all'API
                const response = await fetch('http://localhost:3001/api/voice/text-to-speech', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });

                statusDiv.innerHTML += '<br>✅ Risposta ricevuta (status: ' + response.status + ')';

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Errore API');
                }

                // Ottieni audio blob
                const audioBlob = await response.blob();
                statusDiv.innerHTML += '<br>✅ Audio blob ricevuto (' + (audioBlob.size / 1024).toFixed(2) + ' KB)';

                // Crea URL
                const audioUrl = URL.createObjectURL(audioBlob);
                statusDiv.innerHTML += '<br>✅ URL creato: ' + audioUrl.substring(0, 50) + '...';

                // Crea e riproduci audio
                currentAudio = new Audio(audioUrl);

                currentAudio.onloadedmetadata = () => {
                    statusDiv.innerHTML += '<br>✅ Metadata caricati - Durata: ' + currentAudio.duration.toFixed(2) + 's';
                };

                currentAudio.oncanplaythrough = () => {
                    statusDiv.innerHTML += '<br>✅ Audio pronto per la riproduzione';
                };

                currentAudio.onplay = () => {
                    statusDiv.innerHTML += '<br>🔊 Audio in riproduzione...';
                };

                currentAudio.onended = () => {
                    statusDiv.innerHTML += '<br><span class="success">✅ Riproduzione completata!</span>';
                    URL.revokeObjectURL(audioUrl);
                };

                currentAudio.onerror = (e) => {
                    statusDiv.innerHTML += '<br><span class="error">❌ Errore riproduzione: ' + e.message + '</span>';
                    console.error('Audio error:', e);
                    URL.revokeObjectURL(audioUrl);
                };

                // Avvia riproduzione
                await currentAudio.play();

            } catch (error) {
                statusDiv.innerHTML += '<br><span class="error">❌ Errore: ' + error.message + '</span>';
                console.error('Test error:', error);
            }
        }

        function stopAudio() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                document.getElementById('status').innerHTML += '<br>⏹️ Audio fermato';
            } else {
                document.getElementById('status').innerHTML = '⚠️ Nessun audio in riproduzione';
            }
        }

        function testFile() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = '📁 Caricamento file test-audio-frontend.mp3...';

            const audio = new Audio('test-audio-frontend.mp3');
            currentAudio = audio;

            audio.onloadedmetadata = () => {
                statusDiv.innerHTML += '<br>✅ File caricato - Durata: ' + audio.duration.toFixed(2) + 's';
            };

            audio.onplay = () => {
                statusDiv.innerHTML += '<br>🔊 Riproduzione file locale...';
            };

            audio.onended = () => {
                statusDiv.innerHTML += '<br><span class="success">✅ Riproduzione completata!</span>';
            };

            audio.onerror = (e) => {
                statusDiv.innerHTML += '<br><span class="error">❌ Errore: File non trovato o non riproducibile</span>';
                console.error('File error:', e);
            };

            audio.play().catch(err => {
                statusDiv.innerHTML += '<br><span class="error">❌ Errore play(): ' + err.message + '</span>';
            });
        }
    </script>
</body>
</html>
